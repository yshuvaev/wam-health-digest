<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>План тренировок</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #1a1f2b;
    --text: #e6e8ec;
    --dim: #8b94a3;
    --accent: #a78bfa;
    --accent2: #60a5fa;
    --good: #34d399;
    --warn: #fbbf24;
    --bad: #f87171;
    --border: #2a2f3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  #content { max-width: 760px; margin: 0 auto; padding: 24px 20px 80px; }
  h1, h2, h3, h4 { color: #fff; line-height: 1.25; }
  h1 { font-size: 28px; margin: 24px 0 12px; }
  h2 { font-size: 22px; margin: 32px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  h3 { font-size: 18px; margin: 20px 0 8px; color: var(--accent); }
  h4 { font-size: 16px; margin: 16px 0 8px; color: var(--accent2); }
  p { margin: 10px 0; }
  strong { color: #fff; }
  em { color: var(--dim); font-style: normal; }
  a { color: var(--accent2); text-decoration: none; border-bottom: 1px dashed var(--accent2); }
  a:hover { color: #93c5fd; }
  code {
    background: var(--panel); color: var(--good);
    padding: 1px 6px; border-radius: 4px; font-size: 0.92em;
  }
  table {
    width: 100%; border-collapse: collapse; margin: 12px 0;
    font-size: 0.95em;
  }
  th, td {
    padding: 8px 10px; border: 1px solid var(--border);
    text-align: left;
  }
  th { background: var(--panel); color: #fff; }
  hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
  ul, ol { padding-left: 22px; }
  li { margin: 4px 0; }
  blockquote {
    border-left: 3px solid var(--accent);
    background: var(--panel); padding: 8px 14px;
    margin: 12px 0; color: var(--dim);
  }
  #login-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
  }
  #login-card {
    background: var(--panel);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 28px; max-width: 360px; width: 90%;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }
  #login-card h1 { font-size: 20px; margin: 0 0 16px; }
  #login-card p { color: var(--dim); margin: 0 0 16px; font-size: 14px; }
  #pwd {
    width: 100%; padding: 12px 14px;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 16px; outline: none;
  }
  #pwd:focus { border-color: var(--accent); }
  #go {
    margin-top: 12px; width: 100%;
    padding: 12px; background: var(--accent); color: #0f1115;
    border: 0; border-radius: 8px; font-size: 16px; font-weight: 600;
    cursor: pointer;
  }
  #go:hover { background: #c4b5fd; }
  #err { color: var(--bad); font-size: 13px; margin-top: 10px; min-height: 18px; }
  #signout {
    position: fixed; top: 12px; right: 12px;
    background: var(--panel); color: var(--dim);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 12px; cursor: pointer;
    z-index: 50;
  }
  #signout:hover { color: var(--text); border-color: var(--accent); }
</style>
</head>
<body>

<div id="login-overlay">
  <div id="login-card">
    <h1>План тренировок</h1>
    <p>Введи пароль — страница расшифруется в браузере.</p>
    <input type="password" id="pwd" placeholder="Пароль" autocomplete="current-password" autofocus>
    <button id="go">Открыть</button>
    <div id="err"></div>
  </div>
</div>

<button id="signout" style="display:none">выйти</button>
<div id="content" style="display:none"></div>

const STORAGE_KEY = "training_pwd_v1";
const ITERS = 200000;

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function deriveKey(password, salt) {
  const km = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(password),
    { name: "PBKDF2" }, false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: ITERS, hash: "SHA-256" },
    km,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function tryDecrypt(password) {
  const blob = b64ToBytes(BLOB_B64);
  const salt = blob.slice(0, 16);
  const iv = blob.slice(16, 28);
  const ct = blob.slice(28);
  const key = await deriveKey(password, salt);
  const ptBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder("utf-8").decode(ptBuf);
}

async function unlock(password, fromStorage) {
  const errEl = document.getElementById("err");
  errEl.textContent = "";
  try {
    const html = await tryDecrypt(password);
    try { localStorage.setItem(STORAGE_KEY, password); } catch (e) {}
    document.getElementById("login-overlay").style.display = "none";
    const c = document.getElementById("content");
    c.style.display = "block";
    c.innerHTML = html;
    document.getElementById("signout").style.display = "block";
  } catch (e) {
    if (fromStorage) {
      try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
    } else {
      errEl.textContent = "Неверный пароль.";
    }
  }
}

function signOut() {
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  location.reload();
}

window.addEventListener("DOMContentLoaded", () => {
  const saved = (() => { try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; } })();
  if (saved) unlock(saved, true);
  document.getElementById("go").addEventListener("click", () => {
    unlock(document.getElementById("pwd").value, false);
  });
  document.getElementById("pwd").addEventListener("keydown", e => {
    if (e.key === "Enter") unlock(e.target.value, false);
  });
  document.getElementById("signout").addEventListener("click", signOut);
});
</script>
